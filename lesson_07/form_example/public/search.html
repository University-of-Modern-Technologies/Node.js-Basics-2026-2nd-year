<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Пошук — GET форма</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h2>Пошук <span class="badge badge-info">method="GET"</span></h2>
      <p class="text-muted">
        Дані форми потрапляють в рядок URL: <code>/search?q=значення</code><br />
        На сервері читаємо через <code>req.query.q</code>
      </p>
      <hr />
      <!-- method="GET" — дані йдуть в URL, тіло запиту порожнє -->
      <form action="/search" method="GET">
        <div class="form-group">
          <label for="q">Пошуковий запит</label>
          <input
            type="text"
            class="form-control"
            id="q"
            name="q"
            placeholder="Введіть запит..."
          />
        </div>
        <button type="submit" class="btn btn-primary">Шукати</button>
        <a href="/" class="btn btn-secondary ml-2">На головну</a>
      </form>
    </div>
  </body>
</html>
