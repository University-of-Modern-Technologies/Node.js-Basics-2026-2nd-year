<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Робота з формами — Express</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h1>Приклади роботи з формами</h1>
      <hr />
      <div class="list-group">
        <a href="/search" class="list-group-item list-group-item-action">
          <h5 class="mb-1">GET-форма — Пошук</h5>
          <small class="text-muted">Дані передаються через URL: /search?q=... → req.query</small>
        </a>
        <a href="/register" class="list-group-item list-group-item-action">
          <h5 class="mb-1">POST-форма — Реєстрація</h5>
          <small class="text-muted">
            Дані в тілі запиту → req.body | Валідація | PRG патерн
          </small>
        </a>
      </div>
    </div>
  </body>
</html>
