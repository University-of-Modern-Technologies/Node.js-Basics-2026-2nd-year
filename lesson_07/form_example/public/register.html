<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Реєстрація — POST форма</title>
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container mt-5">
      <h2>Реєстрація <span class="badge badge-warning">method="POST"</span></h2>
      <p class="text-muted">
        Дані форми передаються в тілі запиту (не видно в URL)<br />
        На сервері читаємо через <code>req.body</code> (потребує
        <code>express.urlencoded()</code>)
      </p>
      <hr />

      <!--
        enctype="application/x-www-form-urlencoded" — формат за замовчуванням
        Дані кодуються як: username=Vasyl&email=v%40ua&password=123456
      -->
      <form
        action="/register"
        method="POST"
        enctype="application/x-www-form-urlencoded"
      >
        <!-- text -->
        <div class="form-group">
          <label for="username">Ім'я</label>
          <input
            type="text"
            class="form-control"
            id="username"
            name="username"
            placeholder="Ваше ім'я"
          />
        </div>

        <!-- email -->
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="you@example.com"
          />
        </div>

        <!-- password -->
        <div class="form-group">
          <label for="password">Пароль</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Мінімум 6 символів"
          />
        </div>

        <!-- select -->
        <div class="form-group">
          <label for="role">Роль</label>
          <select class="form-control" id="role" name="role">
            <option value="">— оберіть —</option>
            <option value="student">Студент</option>
            <option value="teacher">Викладач</option>
            <option value="admin">Адмін</option>
          </select>
        </div>

        <!-- radio -->
        <div class="form-group">
          <label>Стать</label>
          <div>
            <div class="form-check form-check-inline">
              <input class="form-check-input" type="radio" name="gender" id="male" value="male" />
              <label class="form-check-label" for="male">Чоловік</label>
            </div>
            <div class="form-check form-check-inline">
              <input
                class="form-check-input"
                type="radio"
                name="gender"
                id="female"
                value="female"
              />
              <label class="form-check-label" for="female">Жінка</label>
            </div>
          </div>
        </div>

        <!-- checkbox -->
        <div class="form-group form-check">
          <input type="checkbox" class="form-check-input" id="agree" name="agree" value="yes" />
          <label class="form-check-label" for="agree">Погоджуюсь з умовами використання</label>
        </div>

        <button type="submit" class="btn btn-success">Зареєструватись</button>
        <a href="/" class="btn btn-secondary ml-2">На головну</a>
      </form>
    </div>
  </body>
</html>
