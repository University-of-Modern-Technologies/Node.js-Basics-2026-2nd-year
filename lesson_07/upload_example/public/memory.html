<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Крок 1 — memoryStorage</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>
<body>
  <main class="container" style="max-width: 600px;">
    <h1>Крок 1 — memoryStorage</h1>
    <p>Файл зберігається в RAM як <code>Buffer</code>. На диск нічого не пишеться.<br>
    На сервері: <code>req.file.buffer</code>, <code>req.file.originalname</code> тощо.</p>
    <form action="/memory" method="POST" enctype="multipart/form-data">
      <label for="file">
        Оберіть будь-який файл:
        <input type="file" id="file" name="file" required>
      </label>
      <button type="submit">Завантажити</button>
    </form>
    <a href="/">← На головну</a>
  </main>
</body>
</html>
